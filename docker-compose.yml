version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gandom
      POSTGRES_USER: gandom
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gandom_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gandom"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gandom:${DB_PASSWORD:-gandom_secret}@db:5432/gandom
      UPLOAD_DIR: /data/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      PORT: "8787"
    volumes:
      - uploads:/data/uploads
    ports:
      - "8787:8787"

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
  uploads:
